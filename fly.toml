# fly.toml app configuration file generated for gorgon-survey on 2026-03-10T21:59:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gorgon-survey'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
    PORT = "8080"
    PHX_HOST = "gorgon-survey.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
